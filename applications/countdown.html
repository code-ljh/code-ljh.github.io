        function ShowApp(which) {

        } ShowApp(0);

        var aapplist = document.getElementById("body-right");
        for (var i = 0; i < appfunction.length; i++) {
            var element = aapplist.children[i].children[1];
            element.style.display = "none";
            element.innerHTML += `
                <a style="text-decoration:none;color:black" href="${appurl[i]}.html"><div class="darkover shadowborder" style="margin:15px;left:0;right:0;height:32px;display:flex;justify-content:center;align-items:center">
                    <p>跳转</p>

            `;
