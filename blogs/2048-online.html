<div id="loadme">
    <div id="main-2048" class="aligntext">
        <div class="centered" style="background-color: #111111;">
            <div id="dialog" class="aligntext absolute" style="left: 0; right: 0; top: 0; bottom: 0; display: none; background-color: rgba(11, 11, 11, 0.8);">
                <h1 class="aligntext">You lose</h1>
                <div style="display: flex; left: 1vw; right: 1vw">
                    <div class="card-catagory flex-item aligntext" style="flex: 1; height: 32px; background-color: blue" onclick="OnRestart()">
                        <p style="color: white">重开</p>    
                    </div>
                </div>
            </div>
            <div id="rd-checker" class="aligntext absolute" style="left: 0; right: 0; top: 0; bottom: 0; display: none; background-color: rgba(11, 11, 11, 0.8);">
                <h1 class="aligntext">确认重置</h1>
                <p>如果你确认重置最高分记录，请在下方的输入框中输入“重置数据”并按下“确认”按钮。</p>
                <input id="inputboxchecker" style="font-family: 'Fira Code'" class="centered">
                <div style="display: flex; left: 1vw; right: 1vw">
                    <div class="card-catagory flex-item aligntext" style="flex: 1; height: 32px; background-color: blue" onclick="OnConfirm()">
                        <p style="color: white">确认</p>
                    </div>
                    <div class="card-catagory flex-item aligntext" style="flex: 1; height: 32px; background-color: red" onclick="OnClose()">
                        <p style="color: white">关闭</p>
                    </div>
                </div>
            </div>
            <div style="display: flex">
                <div id="m11"></div>
                <div id="m12"></div>
                <div id="m13"></div>
                <div id="m14"></div>
            </div>
            <div style="display: flex">
                <div id="m21"></div>
                <div id="m22"></div>
                <div id="m23"></div>
                <div id="m24"></div>
            </div>
            <div style="display: flex">
                <div id="m31"></div>
                <div id="m32"></div>
                <div id="m33"></div>
                <div id="m34"></div>
            </div>
            <div style="display: flex">
                <div id="m41"></div>
                <div id="m42"></div>
                <div id="m43"></div>
                <div id="m44"></div>
            </div>
        </div>
    </div>
</div>
